<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO HESI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<svg width="0" height="0" style="display:none;">
    <defs>
        <g id="speed"><line x1="0" y1="20" x2="200" y2="20" stroke="#fff" stroke-width="1.5" stroke-dasharray="10 30" opacity="0.5"/><line x1="0" y1="40" x2="200" y2="40" stroke="#ff4500" stroke-width="3" stroke-dasharray="50 20" opacity="0.8"/><line x1="0" y1="80" x2="200" y2="80" stroke="#00e5ff" stroke-width="3" stroke-dasharray="60 30" opacity="0.8"/><line x1="0" y1="60" x2="200" y2="60" stroke="#fff" stroke-width="1" stroke-dasharray="5 40" opacity="0.3"/></g>
        <g id="spark"><polygon points="50,10 65,35 100,45 65,55 50,90 35,55 0,45 35,35" fill="#ff4500" /><polygon points="50,25 55,40 75,45 55,50 50,70 45,50 25,45 45,40" fill="#fff" /></g>
    </defs>
</svg>

<div id="game-container">
    <div id="wipe"></div>

    <div id="hud">
        <div class="hud-left">
            <span id="scene-name">SCÈNE 1</span>
            <span id="viewers"><span class="live-dot">●</span> 1,400 VIEWERS</span>
        </div>
        <div id="progress-bar"></div>
    </div>

    <div id="render-area" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:5;"></div>

    <audio id="gameover-sound" preload="auto">
        <source src="assets/son/gameover.mp3" type="audio/mpeg">
    </audio>

    <audio id="hover-sound" preload="auto">
        <source src="assets/son/hover.mp3" type="audio/mpeg">
    </audio>

    <audio id="321-sound" preload="auto">
        <source src="assets/son/321.mp3" type="audio/mpeg">
    </audio>

    <audio id="accel-sound" preload="auto">
        <source src="assets/son/accel.mp3" type="audio/mpeg">
    </audio>

    <div id="controls" style="display:none;">
        <button id="btn-prev">&lt; RETOUR</button>
        <button id="btn-next">SUIVANT &gt;</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
